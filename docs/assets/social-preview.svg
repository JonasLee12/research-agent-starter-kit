<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Research Agent Starter Kit social preview</title>
  <desc id="desc">A GitHub social preview card for a local-first research-agent workflow system for defensible formal research outputs.</desc>
  <rect width="1280" height="640" fill="#f7f9fb"/>
  <rect x="52" y="52" width="1176" height="536" rx="8" fill="#ffffff" stroke="#dbe3ea"/>

  <g opacity="0.9">
    <path d="M88 114 H384" stroke="#dbe3ea" stroke-width="1"/>
    <path d="M88 162 H292" stroke="#dbe3ea" stroke-width="1"/>
    <path d="M88 210 H338" stroke="#dbe3ea" stroke-width="1"/>
    <path d="M88 258 H250" stroke="#dbe3ea" stroke-width="1"/>
    <path d="M88 306 H370" stroke="#dbe3ea" stroke-width="1"/>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" fill="#0f1720">
    <text x="96" y="128" font-size="23" font-weight="700">Research Agent</text>
    <text x="96" y="178" font-size="64" font-weight="800">Starter Kit</text>
    <text x="96" y="244" font-size="30" font-weight="650">Local-first workflows for</text>
    <text x="96" y="286" font-size="30" font-weight="650">defensible formal research outputs.</text>
    <text x="98" y="336" font-size="18" fill="#4b5563">Source-first gates, bounded routing, skill receipts, and delivery guards.</text>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
    <rect x="96" y="390" width="136" height="36" rx="8" fill="#e8f1ff" stroke="#b9d3ff"/>
    <text x="116" y="414" font-size="15" font-weight="700" fill="#1d4ed8">local-first</text>
    <rect x="250" y="390" width="152" height="36" rx="8" fill="#e8fbf3" stroke="#b7ead6"/>
    <text x="270" y="414" font-size="15" font-weight="700" fill="#047857">source-first</text>
    <rect x="420" y="390" width="164" height="36" rx="8" fill="#f2f5f8" stroke="#d8e0e7"/>
    <text x="440" y="414" font-size="15" font-weight="700" fill="#334155">48/48 evals</text>
  </g>

  <g transform="translate(704 94)">
    <rect x="0" y="0" width="438" height="376" rx="8" fill="#101820"/>
    <rect x="0" y="0" width="438" height="46" rx="8" fill="#182333"/>
    <circle cx="24" cy="23" r="6" fill="#ef4444"/>
    <circle cx="46" cy="23" r="6" fill="#f59e0b"/>
    <circle cx="68" cy="23" r="6" fill="#10b981"/>

    <g font-family="Menlo, Consolas, 'Courier New', monospace" font-size="15" fill="#dbeafe">
      <text x="28" y="84">$ agent_runtime "source lookup"</text>
      <text x="28" y="120" fill="#93c5fd">route: bounded_source_planning</text>
      <text x="28" y="156" fill="#a7f3d0">receipts: light</text>
      <text x="28" y="202">$ agent_runtime "formal paragraphs"</text>
      <text x="28" y="238" fill="#fef3c7">route: formal_research_output</text>
      <text x="28" y="274" fill="#fecaca">guard: block weak delivery</text>
    </g>

    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700">
      <rect x="28" y="314" width="86" height="30" rx="8" fill="#e8f1ff"/>
      <text x="44" y="334" fill="#1d4ed8">sources</text>
      <path d="M123 329 H159" stroke="#64748b" stroke-width="2"/>
      <rect x="168" y="314" width="84" height="30" rx="8" fill="#e8fbf3"/>
      <text x="186" y="334" fill="#047857">route</text>
      <path d="M261 329 H297" stroke="#64748b" stroke-width="2"/>
      <rect x="306" y="314" width="104" height="30" rx="8" fill="#fff7ed"/>
      <text x="326" y="334" fill="#c2410c">delivery</text>
    </g>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" fill="#64748b">
    <text x="96" y="530" font-size="15">github.com/JonasLee12/research-agent-starter-kit</text>
  </g>
</svg>
